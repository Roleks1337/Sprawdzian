name: Release simulation

on:
  push:
  workflow_dispatch:

jobs:
  release-sim:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
        uses: actions/checkout@v4
        run: mkdir -p build
        uses: docker/setup-buildx-action@v2
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          outputs: type=docker,dest=build/app-image.tar
        run: gzip -c build/app-image.tar > build/app-image.tar.gz
        uses: actions/upload-artifact@v3
        with:
          name: app-image-tar-gz
          path: build/app-image.tar.gz
        run: docker compose up -d --build
        run: |
          curl --fail --show-error --silent --retry 5 --retry-delay 2 http://localhost:8080/health > build/health.txt
          echo "status: $?" > build/health.exit || true
        if: always()
        run: docker compose logs --no-color > build/compose.log || true
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: compose-logs
          path: build/compose.log
        if: always()
        run: docker compose down -v || true
        